<!-- src/main/resources/static/index.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>Chat with WebSocket and RabbitMQ</title>
    <link
            rel="stylesheet"
            href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@5.0.0/bundles/stomp.umd.min.js"></script>
</head>
<body>
<div class="container mt-5">
    <h2 class="text-center">Lion Chat</h2>
    <div class="row">
        <div class="col-md-6 offset-md-3">
            <div id="login-form">
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input
                            type="text"
                            id="username"
                            class="form-control"
                            placeholder="Enter your name"
                    />
                    <button id="login-btn" class="btn btn-primary">Login</button>
                </div>
            </div>
            <div id="chat-room-list-form" class="d-none">
                <div class="form-group">
                    <label for="opponent">Opponent Id:</label>
                    <input
                            type="text"
                            id="opponent"
                            class="form-control"
                            placeholder="Enter opponent's id"
                    />
                    <button id="connect-btn" class="btn btn-primary">Connect</button>
                </div>
                <ul
                        id="chatroomlist"
                        class="border p-3 mb-3"
                        style="height: 300px; overflow-y: scroll"
                ></ul>
            </div>
            <div id="chat-room" class="d-none">
                <div
                        id="messages"
                        class="border p-3 mb-3"
                        style="height: 300px; overflow-y: scroll"
                ></div>
                <form id="message-form" class="form-inline">
                    <input
                            type="text"
                            id="message"
                            class="form-control flex-grow-1 mr-2"
                            placeholder="Type a message..."
                    />
                    <button type="submit" class="btn btn-success">Send</button>
                </form>
                <button type="button" id="load" class="btn btn-secondary mt-2">
                    Load Old Messages
                </button>
                <button type="button" id="back" class="btn btn-secondary">
                    Back to List
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    let stompClient = null;
    let token = null;
    let lastId = null;
    let subscription = null;
    const connectBtn = document.getElementById("connect-btn");
    const loginBtn = document.getElementById("login-btn");
    const loginForm = document.getElementById("login-form");
    const chatRoom = document.getElementById("chat-room");
    const chatRoomListForm = document.getElementById("chat-room-list-form");
    const chatRoomList = document.getElementById("chatroomlist");
    const messageForm = document.getElementById("message-form");
    const messageInput = document.getElementById("message");
    const messagesArea = document.getElementById("messages");
    const usernameInput = document.getElementById("username");
    const opponentIdInput = document.getElementById("opponent");
    const loadBtn = document.getElementById("load");
    const backBtn = document.getElementById("back");
    const MAX_TIME_INTERVAL = 5000;

    const MAX_RETRIES = 5;
    let retryCount = 0;

    connectBtn.addEventListener("click", connect);
    messageForm.addEventListener("submit", sendMessage);
    loadBtn.addEventListener("click", fetchOldMessage);
    loginBtn.addEventListener("click", login);
    backBtn.addEventListener("click", backToList);

    let chatRoomId = 0;
    let opponentId = 0;

    function unsubscribe() {
        if (subscription) {
            subscription.unsubscribe();
            subscription = null;
        }
    }

    function configWebSocket() {
        stompClient = new StompJs.Client({
            webSocketFactory: () => new SockJS("/ws"),
            connectHeaders: {
                Authorization: `Bearer ${token}`,
            },
            heartbeatIncoming: 12000,
            heartbeatOutgoing: 12000,
            reconnectDelay: Math.random() * MAX_TIME_INTERVAL,
            onConnect: onConnected,
            onStompError: (frame) => {
                console.error("Broker reported error: " + frame.headers["message"]);
                console.error("Additional details: " + frame.body);
                displayMessage({
                    senderName: "System",
                    content:
                        "Could not connect to WebSocket server. Please refresh this page to try again!",
                });
            },
            onWebSocketClose: (event) => {
                console.log("WebSocket connection closed: ", event);

                if (event.code === 1000) {
                    console.log("WebSocket closed normally.");
                } else {
                    console.error("WebSocket closed with error code: ", event.code);
                    retryCount += 1;

                    if (retryCount > MAX_RETRIES) {
                        console.log(
                            "Max retries reached. Stopping reconnection attempts."
                        );
                        stompClient.deactivate();
                    }
                }
            },
            onDisConnect: (frame) => {
                console.log("STOMP client disconnected: ", frame);
            },
        });

        stompClient.activate();
    }

    async function login(event) {
        event.preventDefault();
        token = usernameInput.value.trim();
        if (token) {
            configWebSocket();

            loginForm.classList.add("d-none");
            chatRoomListForm.classList.remove("d-none");

            const res = await fetch("/api/chatrooms", {
                method: "GET",
                headers: {
                    "Content-Type": "application/json",
                    Authorization: `Bearer ${token}`,
                },
            });

            const body = await res.json();

            body.forEach((chatRoom) => {
                const listItem = document.createElement("li");
                listItem.textContent = `Chat Room ID: ${chatRoom.chatRoomId} - 상대: ${chatRoom.name} - 최근 메시지:${chatRoom.lastContent} - 읽음: ${chatRoom.isRead}`;
                listItem.addEventListener("click", () => {
                    joinTheRoom(event, chatRoom.chatRoomId, chatRoom.name);
                });
                chatRoomList.appendChild(listItem);
            });
        }
    }

    async function connect(event) {
        event.preventDefault();
        opponentId = opponentIdInput.value.trim();
        if (token && opponentId) {
            chatRoomListForm.classList.add("d-none");
            chatRoom.classList.remove("d-none");

            const res = await fetch("/api/chatrooms/init", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    Authorization: `Bearer ${token}`,
                },
                body: JSON.stringify({ receiverId: opponentId }),
            });

            const body = await res.json();
            console.log(body);
            chatRoomId = body.chatRoomId;

            subscription = stompClient.subscribe(
                `/topic/chatroom/${chatRoomId}`,
                onMessageReceived
            );

            const result = await fetch("/api/chatrooms/chats/messages?roomId=" + chatRoomId, {
                method: "GET",
                headers: {
                    "Content-Type": "application/json",
                    Authorization: `Bearer ${token}`,
                },
            });

            const chats = await result.json();
            if (chats.length > 0) {
                lastId = chats[0].id;
            }
            chats.forEach((message) => {
                displayMessage(message);
            });
        }
    }

    async function backToList(event) {
        event.preventDefault();

        chatRoomListForm.classList.remove("d-none");
        chatRoom.classList.add("d-none");

        unsubscribe();

        chatRoomList.replaceChildren();
        chatRoomId = 0;

        const res = await fetch("/api/chatrooms", {
            method: "GET",
            headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${token}`,
            },
        });

        const body = await res.json();

        body.forEach((chatRoom) => {
            const listItem = document.createElement("li");
            listItem.textContent = `Chat Room ID: ${chatRoom.chatRoomId} - 상대: ${chatRoom.name} - 최근 메시지:${chatRoom.lastContent} - 읽음: ${chatRoom.isRead}`;
            listItem.addEventListener("click", () => {
                joinTheRoom(event, chatRoom.chatRoomId, chatRoom.name);
            });
            chatRoomList.appendChild(listItem);
        });
    }

    async function joinTheRoom(event, roomId, chatroomOpponent) {
        event.preventDefault();

        chatRoomListForm.classList.add("d-none");
        chatRoom.classList.remove("d-none");

        messagesArea.replaceChildren();

        chatRoomId = roomId;

        console.log(roomId);
        console.log(chatRoomId)

        subscription = stompClient.subscribe(
            `/topic/chatroom/${chatRoomId}`,
            onMessageReceived
        );

        const result = await fetch("/api/chatrooms/chats/messages?roomId=" + chatRoomId, {
            method: "GET",
            headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${token}`,
            },
        });

        const chats = await result.json();
        if (chats.length > 0) {
            lastId = chats.at(-1).id;
        }

        chats.reverse();

        chats.forEach((message) => {
            if(message.senderName === chatroomOpponent){
                opponentId = message.senderId;
            }
            displayMessage(message);
        });
    }

    function onConnected() {
        console.log("WebSocket connected successfully!");
        // If there was a subscription before disconnection, re-subscribe

        retryCount = 0;

        console.log("chat Room ID:", chatRoomId);
        console.log("subscription:", subscription);

        if (subscription) {
            unsubscribe();
            subscription = stompClient.subscribe(
                `/topic/chatroom/${chatRoomId}`,
                onMessageReceived
            );
        }
    }

    function sendMessage(event) {
        event.preventDefault();
        const messageContent = messageInput.value.trim();
        if (messageContent && stompClient && stompClient.active) {
            const chatMessageValue = {
                chatRoomId: chatRoomId,
                content: messageContent
            };
            stompClient.publish({
                destination: "/app/chat.sendMessage",
                headers: { Authorization: `Bearer ${token}` },
                body: JSON.stringify(chatMessageValue),
            });
            messageInput.value = "";
        }
    }

    async function fetchOldMessage() {
        if (lastId) {
            const result = await fetch(
                "/api/chatrooms/chats/messages?roomId=" + chatRoomId + "&lastId=" + lastId,
                {
                    method: "GET",
                    headers: {
                        "Content-Type": "application/json",
                        Authorization: `Bearer ${token}`,
                    },
                }
            );

            const body = await result.json();
            if (body.length > 0) {
                lastId = body.at(-1).id;
                body.forEach((message) => {
                    stackMessage(message);
                });
            }
        }
    }

    function onMessageReceived(payload) {
        const message = JSON.parse(payload.body);
        displayMessage(message);
        console.log(message);
        console.log(opponent);
        if (message.senderId === opponentId) {
            stompClient.publish({
                destination: "/app/message.ack",
                headers: { Authorization: `Bearer ${token}` },
                body: JSON.stringify({
                    messageId: message.messageId,
                    userId: message.senderId
                }),
            });
        }
    }

    function displayMessage(message) {
        const messageElement = document.createElement("div");
        messageElement.innerHTML = `<strong>[${message.senderName}]</strong>: ${message.content}`;
        messagesArea.appendChild(messageElement);
        messagesArea.scrollTop = messagesArea.scrollHeight; // Auto-scroll
    }

    function stackMessage(message) {
        const messageElement = document.createElement("div");
        messageElement.innerHTML = `<strong>[${message.senderName}]</strong>: ${message.content}`;
        messagesArea.insertBefore(messageElement, messagesArea.firstChild);
        messagesArea.scrollTop = 0; // Auto-scroll to top
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Chat with WebSocket and RabbitMQ</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body>
<div class="container mt-5">
    <h2 class="text-center">Lion Chat</h2>
    <div class="row">
        <div class="col-md-6 offset-md-3">
            <div id="login-form">
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" class="form-control" placeholder="Enter your name">
                    <button id="login-btn" class="btn btn-primary">Login</button>
                </div>
            </div>
            <div id="chat-room-list-form" class="d-none">
                <div class="form-group">
                    <label for="opponent">Opponent Id:</label>
                    <input type="text" id="opponent" class="form-control" placeholder="Enter opponent's id">
                    <button id="connect-btn" class="btn btn-primary">Connect</button>
                </div>
                <ul id="chatroomlist" class="border p-3 mb-3" style="height: 300px; overflow-y: scroll;">
                </ul>
            </div>
            <div id="chat-room" class="d-none">
                <div id="messages" class="border p-3 mb-3" style="height: 300px; overflow-y: scroll;"></div>
                <form id="message-form" class="form-inline">
                    <input type="text" id="message" class="form-control flex-grow-1 mr-2" placeholder="Type a message...">
                    <button type="submit" class="btn btn-success">Send</button>
                </form>
                <button type="button" id="load" class="btn btn-secondary mt-2">Load Old Messages</button>
            </div>
        </div>
    </div>
</div>

<script>
    let stompClient = null;
    let username = null;
    let lastId = null;
    const connectBtn = document.getElementById('connect-btn');
    const loginBtn = document.getElementById('login-btn');
    const loginForm = document.getElementById('login-form');
    const chatRoom = document.getElementById('chat-room');
    const chatRoomListForm = document.getElementById('chat-room-list-form');
    const chatRoomList = document.getElementById('chatroomlist')
    const messageForm = document.getElementById('message-form');
    const messageInput = document.getElementById('message');
    const messagesArea = document.getElementById('messages');
    const usernameInput = document.getElementById('username');
    const opponentIdInput = document.getElementById('opponent');
    const loadBtn = document.getElementById('load');

    connectBtn.addEventListener('click', connect);
    messageForm.addEventListener('submit', sendMessage);
    loadBtn.addEventListener('click', fetchOldMessage);
    loginBtn.addEventListener('click', login);

    let chatRoomId=0;
    let opponent = 0;

    async function login(event){
        event.preventDefault();
        token = usernameInput.value.trim();
        if(token){
            loginForm.classList.add('d-none');
            chatRoomListForm.classList.remove('d-none');

            const res = await fetch('/api/chatrooms',
                {
                    method:'GET',
                    headers:{
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    }
                });

            const body = await res.json();

            body.forEach(chatRoom => {
                const listItem = document.createElement('li');
                listItem.textContent = `Chat Room ID: ${chatRoom.chatRoomId} - ىƒپëŒ€: ${chatRoom.opponentName} - ىµœê·¼ ë©”ى‹œى§€:${chatRoom.lastChat} - ى‌½ى‌Œ: ${chatRoom.isRead}`;
                listItem.addEventListener('click', () => {
                    joinTheRoom(event, chatRoom.chatRoomId, chatRoom.opponentId);
                });
                chatRoomList.appendChild(listItem);
            });
        }
    }

    async function connect(event) {
        event.preventDefault();
        opponent = opponentIdInput.value.trim();
        if (token && opponent) {
            chatRoomListForm.classList.add('d-none');
            chatRoom.classList.remove('d-none');

            const res = await fetch('/api/chatrooms', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ id: opponent})
            });

            const body = await res.json()
            chatRoomId = body.id;

            // 1. SockJSë¥¼ ي†µي•´ WebSocket ى—°ê²° ىƒ‌ى„±
            const socket = new SockJS('/ws');

            // 2. ى „ى—­ Stomp ê°‌ى²´ë،œ يپ´ë‌¼ى‌´ى–¸يٹ¸ ىƒ‌ى„±
            stompClient = Stomp.over(socket);

            // 3. ى„œë²„ى—گ ى—°ê²° ى‹œëڈ„
            stompClient.connect({'Authorization': `Bearer ${token}`}, onConnected, onError);
        }
    }

    async function joinTheRoom(event, roomId, opponentId){
        event.preventDefault();

        chatRoomListForm.classList.add('d-none');
        chatRoom.classList.remove('d-none');

        chatRoomId = roomId;
        opponent = opponentId;

        // 1. SockJSë¥¼ ي†µي•´ WebSocket ى—°ê²° ىƒ‌ى„±
        const socket = new SockJS('/ws');

        // 2. ى „ى—­ Stomp ê°‌ى²´ë،œ يپ´ë‌¼ى‌´ى–¸يٹ¸ ىƒ‌ى„±
        stompClient = Stomp.over(socket);

        // 3. ى„œë²„ى—گ ى—°ê²° ى‹œëڈ„
        stompClient.connect({'Authorization': `Bearer ${token}`}, onConnected, onError);
    }

    async function onConnected() {
        // 3. ى—°ê²° ى„±ê³µ ى‹œ, "/topic/public" ي† ي”½ى‌„ êµ¬ëڈ…ي•©ë‹ˆë‹¤.
        //    ى„œë²„ى—گى„œ ى‌´ ي† ي”½ىœ¼ë،œ ë©”ى‹œى§€ë¥¼ ë³´ë‚´ë©´ onMessageReceived ى½œë°±ى‌´ يک¸ى¶œëگ©ë‹ˆë‹¤.
        stompClient.subscribe(`/topic/chatroom${chatRoomId}`, onMessageReceived);
        const result = await fetch('/api/chats/'+chatRoomId, {
            method: 'GET',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            }
        });

        const body = await result.json();
        lastId = body[0].id;
        body.forEach(message => {
            displayMessage(message);
        });
        //displayMessage({ sender: 'System', content: `Welcome, ${username}!` });
    }

    function onError(error) {
        displayMessage({ senderName: 'System', content: 'Could not connect to WebSocket server. Please refresh this page to try again!' });
    }

    function sendMessage(event) {
        event.preventDefault();
        const messageContent = messageInput.value.trim();
        if (messageContent && stompClient) {
            const chatMessageValue = {
                chatRoomId: chatRoomId,
                content: messageContent,
                date: new Date()
            };
            // 4. "/app/chat.sendMessage" ëھ©ى پى§€ë،œ ë©”ى‹œى§€ë¥¼ ى „ى†،ي•©ë‹ˆë‹¤.
            //    ى‌´ ë©”ى‹œى§€ëٹ” ى„œë²„ى‌ک ChatControllerë،œ ë‌¼ىڑ°يŒ…ëگ©ë‹ˆë‹¤.
            stompClient.send("/app/chat.sendMessage", {'Authorization': `Bearer ${token}`}, JSON.stringify(chatMessageValue));
            messageInput.value = '';
        }
    }

    async function fetchOldMessage(){
        if(lastId){
            const result = await fetch('/api/chats/'+chatRoomId+'?lastId='+lastId, {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                }
            });

            const body = await result.json();
            if(body.length > 0){
                lastId = body.at(-1).id;
                body.forEach(message => {
                    stackMessage(message);
                });
            }
        }
    }

    function onMessageReceived(payload) {
        const message = JSON.parse(payload.body);
        displayMessage(message);
        if(message.senderId === opponent) {
            stompClient.send("/app/chat.ack", {'Authorization': `Bearer ${token}`}, JSON.stringify({
                chatRoomId: chatRoomId,
                senderId: message.senderId,
                date: message.date
            }));
        }
    }

    function displayMessage(message) {
        const messageElement = document.createElement('div');
        messageElement.innerHTML = `<strong>[${message.senderName}]</strong>: ${message.content}`;
        messagesArea.appendChild(messageElement);
        messagesArea.scrollTop = messagesArea.scrollHeight; // Auto-scroll
    }

    function stackMessage(message){
        const messageElement = document.createElement('div');
        messageElement.innerHTML = `<strong>[${message.senderName}]</strong>: ${message.content}`;
        messagesArea.insertBefore(messageElement, messagesArea.firstChild);
        messagesArea.scrollTop = 0; // Auto-scroll to top
    }

</script>
</body>
</html>
